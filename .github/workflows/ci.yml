name: CI

# InvestAppCore(순수 로직) 패키지를 macOS 러너에서 빌드·테스트한다.
# SwiftUI 앱 타깃(App/)은 SwiftPM 패키지에 포함되지 않으므로 여기서 빌드되지 않는다.
on:
  push:
    branches: [ main, "claude/**" ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Core 패키지 빌드 & 테스트
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Swift 버전 확인
        run: swift --version

      - name: 빌드
        run: swift build -v

      - name: 테스트
        run: swift test --enable-code-coverage
